<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LIVRA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
  :root{
    --cream:#F7F3EC;
    --ink:#20201C;
    --brass:#A8823A;
    --brass-dim:#c9ad78;
    --line:#E4DCCB;
    --danger:#A8422F;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.serif{ font-family:'Cormorant Garamond', serif; }
  a{ color:inherit; }
  button{ font-family:inherit; cursor:pointer; }
  ::selection{ background:var(--brass); color:white; }

  .nav{
    position:sticky; top:0; z-index:20;
    background:rgba(247,243,236,0.92); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .nav-inner{ display:flex; align-items:center; justify-content:space-between; padding:18px 20px; max-width:1100px; margin:0 auto; }
  .logo{ font-family:'Cormorant Garamond', serif; font-size:28px; letter-spacing:2px; font-weight:500; }
  .cart-btn{
    position:relative; background:none; border:none; padding:6px; color:var(--ink);
    display:flex; align-items:center; justify-content:center;
  }
  .cart-btn:hover{ color:var(--brass); }
  .cart-count{ position:absolute; top:-8px; right:-8px; background:var(--brass); color:white; border-radius:50%; width:20px; height:20px; font-size:11px; display:flex; align-items:center; justify-content:center; }

  .hero{ padding:56px 20px 26px; text-align:center; }
  .hero h1{ font-size:52px; font-weight:500; margin:0 0 10px; }
  .hero p{ color:#6b6558; font-size:16px; max-width:480px; margin:0 auto; }

  .toolbar{
    display:flex; gap:10px; align-items:center;
    max-width:1100px; margin:0 auto; padding:6px 20px 4px;
  }
  .toolbar .search{
    flex:1; margin:0; border-radius:999px; padding:11px 18px; font-size:14px;
    border:1px solid var(--line);
  }
  .toolbar .sort{
    width:auto; margin:0; border-radius:999px; padding:11px 14px; font-size:13px; color:#6b6558;
  }
  .chips{
    display:flex; gap:8px; align-items:center;
    padding:6px 20px; max-width:1100px; margin:0 auto;
    overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{ display:none; }
  .chip-label{
    font-size:10.5px; letter-spacing:1.2px; text-transform:uppercase; color:#a39c8a;
    flex:none; width:38px;
  }
  .chip{
    border:1px solid var(--line); background:white; border-radius:999px;
    padding:8px 16px; font-size:13px; letter-spacing:0.4px; color:#6b6558;
    transition:all .2s; flex:none; white-space:nowrap;
  }
  .chip.active{ background:var(--ink); color:white; border-color:var(--ink); }

  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:28px; padding:26px 20px 80px; max-width:1100px; margin:0 auto; }
  .card{ background:white; border:1px solid var(--line); overflow:hidden; transition:transform .25s ease, box-shadow .25s ease; cursor:pointer; }
  .card:hover{ transform:translateY(-3px); box-shadow:0 12px 24px rgba(32,32,28,0.08); }
  .card-img{ width:100%; aspect-ratio:1; object-fit:cover; background:#eee; display:block; }
  .card-body{ padding:16px 18px 20px; }
  .card-cat{ font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#a39c8a; margin:0 0 4px; }
  .card-name{ font-size:19px; font-family:'Cormorant Garamond', serif; margin:0 0 4px; }
  .card-price{ color:var(--brass); font-weight:600; font-size:15px; margin:0 0 12px; }
  .card-stock{ font-size:12px; color:#8a8474; margin-bottom:10px; }
  .btn{
    display:inline-block; background:var(--ink); color:white; border:none;
    padding:11px 20px; font-size:13px; letter-spacing:0.5px; width:100%;
    text-align:center; transition:background .2s;
  }
  .btn:hover{ background:var(--brass); }
  .btn.outline{ background:none; color:var(--ink); border:1px solid var(--ink); }
  .btn.outline:hover{ background:var(--ink); color:white; }
  .btn.danger{ background:var(--danger); }
  .btn:disabled{ opacity:0.4; cursor:not-allowed; }

  .overlay{ position:fixed; inset:0; background:rgba(32,32,28,0.4); z-index:40; }
  .drawer{
    position:fixed; top:0; right:0; height:100%; width:min(440px,100%);
    background:var(--cream); z-index:50; padding:26px 24px 40px; overflow-y:auto;
    box-shadow:-10px 0 30px rgba(0,0,0,0.15);
  }
  .drawer h2{ font-size:26px; margin-top:0; }
  .close-x{ background:none; border:none; font-size:24px; float:right; line-height:1; }

  .gallery-main{ width:100%; aspect-ratio:1; object-fit:cover; background:#eee; display:block; border:1px solid var(--line); }
  .gallery-thumbs{ display:flex; gap:8px; margin-top:8px; }
  .gallery-thumbs img{
    width:64px; height:64px; object-fit:cover; border:2px solid transparent; cursor:pointer; background:#eee;
  }
  .gallery-thumbs img.sel{ border-color:var(--brass); }

  .detail-cat{ font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:#a39c8a; margin:18px 0 2px; }
  .detail-name{ font-size:30px; font-family:'Cormorant Garamond', serif; margin:0 0 4px; }
  .detail-price{ color:var(--brass); font-weight:600; font-size:19px; margin:0 0 14px; }
  .detail-desc{ font-size:14px; line-height:1.65; color:#4c4638; margin:0 0 18px; white-space:pre-wrap; }
  .spec-title{ font-size:12px; letter-spacing:1.2px; text-transform:uppercase; color:#8a8474; margin:0 0 8px; }
  .spec-row{ display:flex; justify-content:space-between; gap:14px; padding:8px 0; border-bottom:1px solid var(--line); font-size:13.5px; }
  .spec-row .k{ color:#8a8474; }
  .spec-row .v{ text-align:right; }

  .cart-line{ display:flex; gap:12px; padding:14px 0; border-bottom:1px solid var(--line); align-items:center; }
  .cart-line img{ width:56px; height:56px; object-fit:cover; }
  .cart-line-info{ flex:1; }
  .cart-line-info .nm{ font-size:15px; margin:0; }
  .qty-row{ display:flex; align-items:center; gap:8px; margin-top:6px; }
  .qty-row button{ background:none; border:1px solid var(--line); width:26px; height:26px; }

  input,textarea,select{
    width:100%; padding:10px 12px; border:1px solid var(--line); background:white;
    font-family:inherit; font-size:14px; margin-bottom:14px;
  }
  label{ font-size:12px; letter-spacing:0.5px; color:#6b6558; display:block; margin-bottom:4px; }
  .hint{ font-size:11.5px; color:#a39c8a; margin:-10px 0 12px; }

  .pay-option{ border:1px solid var(--line); padding:14px; margin-bottom:10px; cursor:pointer; background:white; }
  .pay-option.selected{ border-color:var(--brass); background:#fbf6ec; }

  .footer{ text-align:center; padding:40px 20px; color:#8a8474; font-size:13px; border-top:1px solid var(--line); }
  .admin-link{ font-size:11px; color:#c9c2b0; }

  .admin-wrap{ max-width:960px; margin:0 auto; padding:40px 20px 100px; }
  .tabs{ display:flex; gap:10px; margin-bottom:28px; border-bottom:1px solid var(--line); }
  .tab{ padding:10px 4px; margin-right:20px; background:none; border:none; font-size:14px; color:#8a8474; border-bottom:2px solid transparent; }
  .tab.active{ color:var(--ink); border-bottom-color:var(--brass); }
  .admin-row{ display:flex; gap:16px; align-items:center; padding:14px 0; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .admin-row img{ width:56px; height:56px; object-fit:cover; }
  .admin-row .grow{ flex:1; min-width:150px; }
  .status-pill{ font-size:11px; padding:4px 10px; border-radius:999px; text-transform:uppercase; letter-spacing:0.5px; }
  .status-pending_verification{ background:#f6e7d0; color:#8a5a1e; }
  .status-paid{ background:#dcefe0; color:#2c6e3f; }
  .status-shipped{ background:#dde7f6; color:#2c4e8a; }
  .status-completed{ background:#e6e6e6; color:#555; }
  .status-cancelled{ background:#f6dcdc; color:#8a2c2c; }

  .form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:0 16px; }
  .photo-strip{ display:flex; gap:10px; flex-wrap:wrap; margin:6px 0 14px; }
  .photo-slot{ position:relative; }
  .photo-slot img{ width:76px; height:76px; object-fit:cover; border:1px solid var(--line); display:block; }
  .photo-slot .rm{
    position:absolute; top:-8px; right:-8px; width:22px; height:22px; border-radius:50%;
    background:var(--danger); color:white; border:none; font-size:13px; line-height:1;
  }
  .empty{ text-align:center; padding:60px 20px; color:#a39c8a; }
  .invoice-wrap{ position:fixed; inset:0; background:rgba(32,32,28,0.5); z-index:60; overflow-y:auto; padding:24px 12px; }
  .invoice-sheet{
    background:white; max-width:520px; margin:0 auto; padding:40px 34px;
    border:1px solid var(--line);
  }
  .inv-brand{ font-family:'Cormorant Garamond',serif; font-size:30px; letter-spacing:5px; }
  .inv-label{ font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#a39c8a; margin:18px 0 3px; }
  .inv-row{ display:flex; justify-content:space-between; gap:12px; font-size:13.5px; padding:7px 0; border-bottom:1px solid var(--line); }
  .inv-total{ font-weight:600; font-size:15px; border-bottom:none; padding-top:12px; }
  .inv-actions{ max-width:520px; margin:14px auto 40px; display:flex; gap:10px; }
  @media print{
    body *{ visibility:hidden; }
    .invoice-sheet, .invoice-sheet *{ visibility:visible; }
    .invoice-wrap{ position:absolute; inset:0; padding:0; background:white; overflow:visible; }
    .invoice-sheet{ border:none; max-width:none; margin:0; }
    .inv-actions{ display:none; }
  }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:white; padding:12px 24px; z-index:100; font-size:14px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useMemo } = React;

const SUPABASE_URL = "https://empjwjjonbjbwiwcxlao.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtcGp3ampvbmJqYndpd2N4bGFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MzAxODgsImV4cCI6MjA5OTMwNjE4OH0.nMrAU1a8teyBJDvPfr46dn7oVktx9QVtjT22CIAzzws";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const BKASH_NUMBER = "01675362939";
const CASHOUT_RATE = 0.0185;

const ROOMS = [
  "Living Room", "Bedroom", "Dining", "Office & Study", "Kitchen", "Outdoor & Balcony", "Any Room"
];
const TYPES = [
  "Sofas & Seating", "Tables", "Chairs", "Beds", "Storage & Shelving",
  "Lighting", "Rugs & Textiles", "Wall Decor", "Home Accents", "Kitchen & Dining", "Other"
];
const MAX_PHOTOS = 4;
const PLACEHOLDER = "https://placehold.co/600x600?text=LIVRA";

function money(n){
  return "\u09F3" + Number(n).toLocaleString("en-BD", { maximumFractionDigits: 0 });
}
function firstImage(p){
  if(p.images && p.images.length > 0) return p.images[0];
  if(p.image_url) return p.image_url;
  return PLACEHOLDER;
}
function allImages(p){
  if(p.images && p.images.length > 0) return p.images;
  if(p.image_url) return [p.image_url];
  return [PLACEHOLDER];
}
function parseSpecs(text){
  if(!text) return [];
  return text.split("\n").map(line => line.trim()).filter(Boolean).map(line => {
    const idx = line.indexOf(":");
    if(idx > 0) return { k: line.slice(0, idx).trim(), v: line.slice(idx + 1).trim() };
    return { k: "", v: line };
  });
}

function Toast({ message }){
  if(!message) return null;
  return <div className="toast">{message}</div>;
}

/* ============ STOREFRONT ============ */

function Storefront(){
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [checkoutOpen, setCheckoutOpen] = useState(false);
  const [detail, setDetail] = useState(null);
  const [room, setRoom] = useState("All");
  const [type, setType] = useState("All");
  const [query, setQuery] = useState("");
  const [sort, setSort] = useState("newest");
  const [toast, setToast] = useState("");

  const loadProducts = useCallback(async () => {
    setLoading(true);
    const { data, error } = await sb
      .from("products")
      .select("*")
      .eq("active", true)
      .order("created_at", { ascending: false });
    if(!error) setProducts(data || []);
    setLoading(false);
  }, []);

  useEffect(() => { loadProducts(); }, [loadProducts]);

  const rooms = useMemo(() => {
    const found = [];
    products.forEach(p => {
      const r = p.room || "Any Room";
      if(found.indexOf(r) === -1) found.push(r);
    });
    return ["All"].concat(found);
  }, [products]);

  const types = useMemo(() => {
    const found = [];
    products.forEach(p => {
      const c = p.category || "Other";
      if(found.indexOf(c) === -1) found.push(c);
    });
    return ["All"].concat(found);
  }, [products]);

  const visible = useMemo(() => {
    let list = products;
    if(room !== "All") list = list.filter(p => (p.room || "Any Room") === room);
    if(type !== "All") list = list.filter(p => (p.category || "Other") === type);
    if(query.trim()){
      const q = query.trim().toLowerCase();
      list = list.filter(p =>
        (p.name || "").toLowerCase().indexOf(q) !== -1 ||
        (p.description || "").toLowerCase().indexOf(q) !== -1 ||
        (p.category || "").toLowerCase().indexOf(q) !== -1 ||
        (p.room || "").toLowerCase().indexOf(q) !== -1
      );
    }
    list = list.slice();
    if(sort === "price_low") list.sort((a, b) => a.price - b.price);
    else if(sort === "price_high") list.sort((a, b) => b.price - a.price);
    return list;
  }, [products, room, type, query, sort]);

  function showToast(msg){
    setToast(msg);
    setTimeout(() => setToast(""), 2200);
  }

  function addToCart(product){
    setCart(prev => {
      const existing = prev.find(l => l.product_id === product.id);
      if(existing){
        return prev.map(l => l.product_id === product.id ? { ...l, qty: Math.min(l.qty + 1, product.stock) } : l);
      }
      return [...prev, { product_id: product.id, name: product.name, price: product.price, image_url: firstImage(product), qty: 1, stock: product.stock }];
    });
    showToast('Added "' + product.name + '" to bag');
  }

  function updateQty(product_id, delta){
    setCart(prev => prev
      .map(l => l.product_id === product_id ? { ...l, qty: l.qty + delta } : l)
      .filter(l => l.qty > 0)
    );
  }

  const cartCount = cart.reduce((s, l) => s + l.qty, 0);
  const cartTotal = cart.reduce((s, l) => s + l.qty * l.price, 0);

  return (
    <div>
      <Toast message={toast} />
      <nav className="nav">
        <div className="nav-inner">
          <div className="logo">LIVRA</div>
          <button className="cart-btn" onClick={() => setCartOpen(true)} aria-label="Shopping bag">
            <svg width="22" height="24" viewBox="0 0 22 24" fill="none">
              <path d="M3 7.5 H19 L17.6 21 H4.4 Z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round"/>
              <path d="M7 10 V6 a4 4 0 0 1 8 0 v4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
            {cartCount > 0 && <span className="cart-count">{cartCount}</span>}
          </button>
        </div>
      </nav>

      <div className="hero">
        <h1>Live in your own aura</h1>
        <p>Considered pieces, shipped with care.</p>
      </div>

      <div className="toolbar">
        <input
          className="search"
          value={query}
          onChange={e => setQuery(e.target.value)}
          placeholder="Search pieces\u2026 e.g. table, rattan, lamp"
        />
        <select className="sort" value={sort} onChange={e => setSort(e.target.value)}>
          <option value="newest">Newest first</option>
          <option value="price_low">Price: low to high</option>
          <option value="price_high">Price: high to low</option>
        </select>
      </div>

      {rooms.length > 2 && (
        <div className="chips">
          <span className="chip-label">Room</span>
          {rooms.map(r => (
            <button key={r} className={"chip" + (room === r ? " active" : "")} onClick={() => setRoom(r)}>
              {r}
            </button>
          ))}
        </div>
      )}
      {types.length > 2 && (
        <div className="chips">
          <span className="chip-label">Type</span>
          {types.map(t => (
            <button key={t} className={"chip" + (type === t ? " active" : "")} onClick={() => setType(t)}>
              {t}
            </button>
          ))}
        </div>
      )}

      {loading ? (
        <div className="empty">Loading pieces\u2026</div>
      ) : visible.length === 0 ? (
        <div className="empty">
          {products.length === 0 ? "Nothing here yet \u2014 check back soon." : "No pieces match \u2014 try clearing the search or filters."}
        </div>
      ) : (
        <div className="grid">
          {visible.map(p => (
            <div className="card" key={p.id} onClick={() => setDetail(p)}>
              <img className="card-img" src={firstImage(p)} alt={p.name} />
              <div className="card-body">
                <p className="card-cat">{(p.room && p.room !== "Any Room" ? p.room + " \u00B7 " : "") + (p.category || "Other")}</p>
                <h3 className="card-name">{p.name}</h3>
                <p className="card-price">{money(p.price)}</p>
                <p className="card-stock">{p.stock > 0 ? p.stock + " in stock" : "Out of stock"}</p>
                <button
                  className="btn"
                  disabled={p.stock <= 0}
                  onClick={(e) => { e.stopPropagation(); addToCart(p); }}
                >
                  {p.stock <= 0 ? "Sold out" : "Add to bag"}
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {detail && (
        <ProductDetail
          product={detail}
          onClose={() => setDetail(null)}
          onAdd={(p) => { addToCart(p); }}
        />
      )}

      {cartOpen && (
        <React.Fragment>
          <div className="overlay" onClick={() => setCartOpen(false)} />
          <div className="drawer">
            <button className="close-x" onClick={() => setCartOpen(false)}>\u00D7</button>
            <h2>Your bag</h2>
            {cart.length === 0 ? (
              <p style={{color:"#8a8474"}}>Your bag is empty.</p>
            ) : (
              <React.Fragment>
                {cart.map(l => (
                  <div className="cart-line" key={l.product_id}>
                    <img src={l.image_url} alt={l.name} />
                    <div className="cart-line-info">
                      <p className="nm">{l.name}</p>
                      <div className="qty-row">
                        <button onClick={() => updateQty(l.product_id, -1)}>\u2212</button>
                        <span>{l.qty}</span>
                        <button onClick={() => updateQty(l.product_id, 1)} disabled={l.qty >= l.stock}>+</button>
                      </div>
                    </div>
                    <div>{money(l.price * l.qty)}</div>
                  </div>
                ))}
                <div style={{display:"flex", justifyContent:"space-between", padding:"18px 0", fontWeight:600}}>
                  <span>Total</span><span>{money(cartTotal)}</span>
                </div>
                <button className="btn" onClick={() => { setCartOpen(false); setCheckoutOpen(true); }}>
                  Checkout
                </button>
              </React.Fragment>
            )}
          </div>
        </React.Fragment>
      )}

      {checkoutOpen && (
        <Checkout
          cart={cart}
          total={cartTotal}
          onClose={() => setCheckoutOpen(false)}
          onSuccess={() => { setCart([]); setCheckoutOpen(false); showToast("Order placed \u2014 thank you!"); }}
        />
      )}

      <div className="footer">
        <div>\u00A9 {new Date().getFullYear()} LIVRA</div>
        <a className="admin-link" href="#/admin">admin</a>
      </div>
    </div>
  );
}

function ProductDetail({ product, onClose, onAdd }){
  const imgs = allImages(product);
  const [idx, setIdx] = useState(0);
  const specs = parseSpecs(product.specifications);

  return (
    <React.Fragment>
      <div className="overlay" onClick={onClose} />
      <div className="drawer">
        <button className="close-x" onClick={onClose}>\u00D7</button>
        <div style={{clear:"both"}} />

        <img className="gallery-main" src={imgs[idx]} alt={product.name} />
        {imgs.length > 1 && (
          <div className="gallery-thumbs">
            {imgs.map((u, i) => (
              <img key={i} src={u} className={i === idx ? "sel" : ""} onClick={() => setIdx(i)} alt="" />
            ))}
          </div>
        )}

        <p className="detail-cat">{(product.room && product.room !== "Any Room" ? product.room + " \u00B7 " : "") + (product.category || "Other")}</p>
        <h2 className="detail-name">{product.name}</h2>
        <p className="detail-price">{money(product.price)}</p>

        {product.description && <p className="detail-desc">{product.description}</p>}

        {specs.length > 0 && (
          <div style={{marginBottom:20}}>
            <p className="spec-title">Details</p>
            {specs.map((s, i) => (
              <div className="spec-row" key={i}>
                {s.k ? <span className="k">{s.k}</span> : null}
                <span className="v">{s.v}</span>
              </div>
            ))}
          </div>
        )}

        <p style={{fontSize:12, color:"#8a8474", margin:"0 0 10px"}}>
          {product.stock > 0 ? product.stock + " in stock" : "Out of stock"}
        </p>
        <button className="btn" disabled={product.stock <= 0} onClick={() => onAdd(product)}>
          {product.stock <= 0 ? "Sold out" : "Add to bag"}
        </button>
      </div>
    </React.Fragment>
  );
}

/* ============ CHECKOUT ============ */

function Checkout({ cart, total, onClose, onSuccess }){
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [address, setAddress] = useState("");
  const [txnId, setTxnId] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState("");

  const cashoutCharge = Math.ceil(total * CASHOUT_RATE);
  const amountToSend = total + cashoutCharge;

  async function submitOrder(){
    setError("");
    if(!name || !phone || !address){
      setError("Please fill in your name, phone, and address.");
      return;
    }
    if(!txnId){
      setError("Enter the transaction ID from your payment so we can verify it.");
      return;
    }
    setSubmitting(true);
    const { error: insertError } = await sb.from("orders").insert({
      customer_name: name,
      phone,
      address,
      items: cart.map(l => ({ product_id: l.product_id, name: l.name, price: l.price, qty: l.qty })),
      total,
      cashout_charge: cashoutCharge,
      payment_method: "bkash",
      txn_id: txnId,
      status: "pending_verification",
    });
    setSubmitting(false);
    if(insertError){
      setError("Something went wrong submitting your order. Please try again.");
      return;
    }
    onSuccess();
  }

  return (
    <React.Fragment>
      <div className="overlay" onClick={onClose} />
      <div className="drawer">
        <button className="close-x" onClick={onClose}>\u00D7</button>
        <h2>Checkout</h2>

        <label>Full name</label>
        <input value={name} onChange={e => setName(e.target.value)} placeholder="Your name" />

        <label>Phone number</label>
        <input value={phone} onChange={e => setPhone(e.target.value)} placeholder="01XXXXXXXXX" />

        <label>Delivery address</label>
        <textarea rows="3" value={address} onChange={e => setAddress(e.target.value)} placeholder="House, road, area, city" />

        <label>Payment</label>
        <div className="pay-option selected">
          <strong>bKash</strong>
          <p style={{margin:"6px 0 0", fontSize:13, color:"#6b6558"}}>
            Send Money <strong>{money(amountToSend)}</strong> to <strong>{BKASH_NUMBER}</strong> (personal number \u2014 cash-out charge included), then enter the transaction ID below.
          </p>
        </div>

        <label>Transaction ID</label>
        <input value={txnId} onChange={e => setTxnId(e.target.value)} placeholder="e.g. 8N7K2X9ABC" />

        {error && <p style={{color:"#A8422F", fontSize:13}}>{error}</p>}

        <div style={{padding:"10px 0 18px", fontSize:14}}>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:4}}>
            <span>Subtotal</span><span>{money(total)}</span>
          </div>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:4, color:"#6b6558"}}>
            <span>Cash-out charge</span><span>{money(cashoutCharge)}</span>
          </div>
          <div style={{display:"flex", justifyContent:"space-between", fontWeight:600, borderTop:"1px solid var(--line)", paddingTop:8, marginTop:8}}>
            <span>Amount to send</span><span>{money(amountToSend)}</span>
          </div>
        </div>

        <button className="btn" disabled={submitting} onClick={submitOrder}>
          {submitting ? "Placing order\u2026" : "Place order"}
        </button>
        <p style={{fontSize:12, color:"#a39c8a", marginTop:10}}>
          Your order will be marked as pending until we verify your payment. We'll reach out on the phone number you provided.
        </p>
      </div>
    </React.Fragment>
  );
}

/* ============ ADMIN ============ */

function AdminLogin(){
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  async function login(){
    setLoading(true);
    setError("");
    const { error } = await sb.auth.signInWithPassword({ email, password });
    setLoading(false);
    if(error){ setError(error.message); }
  }

  return (
    <div className="admin-wrap" style={{maxWidth:380}}>
      <h2>Admin login</h2>
      <label>Email</label>
      <input value={email} onChange={e => setEmail(e.target.value)} type="email" />
      <label>Password</label>
      <input value={password} onChange={e => setPassword(e.target.value)} type="password" onKeyDown={e => e.key === "Enter" && login()} />
      {error && <p style={{color:"#A8422F", fontSize:13}}>{error}</p>}
      <button className="btn" disabled={loading} onClick={login}>{loading ? "Signing in\u2026" : "Sign in"}</button>
    </div>
  );
}

function AdminDashboard(){
  const [tab, setTab] = useState("products");
  return (
    <div className="admin-wrap">
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
        <h1 style={{fontSize:32}}>LIVRA Admin</h1>
        <button className="btn outline" style={{width:"auto"}} onClick={() => sb.auth.signOut().then(() => window.location.reload())}>
          Sign out
        </button>
      </div>
      <div className="tabs">
        <button className={"tab" + (tab === "products" ? " active" : "")} onClick={() => setTab("products")}>Products</button>
        <button className={"tab" + (tab === "orders" ? " active" : "")} onClick={() => setTab("orders")}>Orders</button>
      </div>
      {tab === "products" ? <ProductsAdmin /> : <OrdersAdmin />}
    </div>
  );
}

function emptyProduct(){
  return { id: null, name: "", description: "", price: "", stock: "", images: [], category: "Other", room: "Any Room", specifications: "", active: true };
}
function toFormProduct(p){
  return {
    id: p.id,
    name: p.name || "",
    description: p.description || "",
    price: p.price,
    stock: p.stock,
    images: (p.images && p.images.length > 0) ? p.images.slice() : (p.image_url ? [p.image_url] : []),
    category: p.category || "Other",
    room: p.room || "Any Room",
    specifications: p.specifications || "",
    active: p.active,
  };
}

function ProductsAdmin(){
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editing, setEditing] = useState(null);
  const [uploading, setUploading] = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    const { data, error } = await sb.from("products").select("*").order("created_at", { ascending: false });
    if(!error) setProducts(data || []);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  async function uploadPhotos(files){
    setUploading(true);
    const urls = [];
    for(let i = 0; i < files.length; i++){
      const file = files[i];
      const ext = file.name.split(".").pop();
      const path = Date.now() + "-" + Math.random().toString(36).slice(2) + "." + ext;
      const { error } = await sb.storage.from("product-images").upload(path, file);
      if(error){
        alert("One photo failed to upload: " + error.message);
        continue;
      }
      const { data } = sb.storage.from("product-images").getPublicUrl(path);
      urls.push(data.publicUrl);
    }
    setUploading(false);
    return urls;
  }

  async function saveProduct(p){
    if(!p.name){ alert("Please give the product a name."); return; }
    const payload = {
      name: p.name,
      description: p.description,
      price: parseFloat(p.price) || 0,
      stock: parseInt(p.stock) || 0,
      images: p.images,
      image_url: p.images[0] || null,
      category: p.category || "Other",
      room: p.room || "Any Room",
      specifications: p.specifications || "",
      active: p.active,
    };
    if(p.id){
      await sb.from("products").update(payload).eq("id", p.id);
    } else {
      await sb.from("products").insert(payload);
    }
    setEditing(null);
    load();
  }

  async function deleteProduct(id){
    if(!confirm("Delete this product? This can't be undone.")) return;
    await sb.from("products").delete().eq("id", id);
    load();
  }

  async function toggleActive(p){
    await sb.from("products").update({ active: !p.active }).eq("id", p.id);
    load();
  }

  return (
    <div>
      <button className="btn" style={{width:"auto", marginBottom:20}} onClick={() => setEditing(emptyProduct())}>
        + Add product
      </button>

      {editing && (
        <ProductForm
          product={editing}
          uploading={uploading}
          onUpload={uploadPhotos}
          onCancel={() => setEditing(null)}
          onSave={saveProduct}
        />
      )}

      {loading ? (
        <p>Loading\u2026</p>
      ) : products.length === 0 ? (
        <div className="empty">No products yet. Add your first one above.</div>
      ) : (
        products.map(p => (
          <div className="admin-row" key={p.id}>
            <img src={firstImage(p)} alt={p.name} />
            <div className="grow">
              <strong>{p.name}</strong>
              <div style={{fontSize:13, color:"#8a8474"}}>
                {(p.room && p.room !== "Any Room" ? p.room + " \u00B7 " : "") + (p.category || "Other")} \u00B7 {money(p.price)} \u00B7 {p.stock} in stock \u00B7 {allImages(p).length} photo{allImages(p).length > 1 ? "s" : ""} {!p.active && "\u00B7 hidden"}
              </div>
            </div>
            <button className="btn outline" style={{width:"auto"}} onClick={() => setEditing(toFormProduct(p))}>Edit</button>
            <button className="btn outline" style={{width:"auto"}} onClick={() => toggleActive(p)}>{p.active ? "Hide" : "Unhide"}</button>
            <button className="btn danger" style={{width:"auto"}} onClick={() => deleteProduct(p.id)}>Delete</button>
          </div>
        ))
      )}
    </div>
  );
}

function ProductForm({ product, uploading, onUpload, onCancel, onSave }){
  const [p, setP] = useState(product);

  async function handleFiles(e){
    const files = Array.from(e.target.files || []);
    if(files.length === 0) return;
    const room = MAX_PHOTOS - p.images.length;
    if(room <= 0){
      alert("Maximum " + MAX_PHOTOS + " photos. Remove one first.");
      return;
    }
    const chosen = files.slice(0, room);
    if(files.length > room){
      alert("Only " + room + " more photo" + (room > 1 ? "s" : "") + " can be added (max " + MAX_PHOTOS + ").");
    }
    const urls = await onUpload(chosen);
    if(urls.length > 0){
      setP(prev => ({ ...prev, images: prev.images.concat(urls) }));
    }
    e.target.value = "";
  }

  function removePhoto(i){
    setP(prev => ({ ...prev, images: prev.images.filter((_, idx) => idx !== i) }));
  }

  return (
    <div style={{border:"1px solid var(--line)", padding:20, marginBottom:24, background:"white"}}>
      <label>Product name</label>
      <input value={p.name} onChange={e => setP({...p, name: e.target.value})} />

      <div className="form-grid">
        <div>
          <label>Type</label>
          <select value={p.category} onChange={e => setP({...p, category: e.target.value})}>
            {TYPES.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div>
          <label>Room</label>
          <select value={p.room} onChange={e => setP({...p, room: e.target.value})}>
            {ROOMS.map(r => <option key={r} value={r}>{r}</option>)}
          </select>
        </div>
      </div>

      <label>Description</label>
      <textarea rows="3" value={p.description} onChange={e => setP({...p, description: e.target.value})} />

      <div className="form-grid">
        <div>
          <label>Price (\u09F3)</label>
          <input type="number" value={p.price} onChange={e => setP({...p, price: e.target.value})} />
        </div>
        <div>
          <label>Stock</label>
          <input type="number" value={p.stock} onChange={e => setP({...p, stock: e.target.value})} />
        </div>
      </div>

      <label>Photos ({p.images.length}/{MAX_PHOTOS})</label>
      {p.images.length > 0 && (
        <div className="photo-strip">
          {p.images.map((u, i) => (
            <div className="photo-slot" key={i}>
              <img src={u} alt="" />
              <button className="rm" onClick={() => removePhoto(i)}>\u00D7</button>
            </div>
          ))}
        </div>
      )}
      {p.images.length < MAX_PHOTOS && (
        <input type="file" accept="image/*" multiple onChange={handleFiles} />
      )}
      <p className="hint">First photo is the cover. You can select several at once.</p>
      {uploading && <p style={{fontSize:13}}>Uploading\u2026</p>}

      <label>Specifications</label>
      <textarea
        rows="4"
        value={p.specifications}
        onChange={e => setP({...p, specifications: e.target.value})}
        placeholder={"Material: Solid teak wood\nSize: 45cm x 45cm x 55cm\nWeight: 6 kg\nCare: Wipe with dry cloth"}
      />
      <p className="hint">One per line, written as Label: value. Shown as a neat details table on the product page.</p>

      <div style={{display:"flex", gap:10, marginTop:6}}>
        <button className="btn" disabled={uploading} onClick={() => onSave(p)}>Save product</button>
        <button className="btn outline" onClick={onCancel}>Cancel</button>
      </div>
    </div>
  );
}

const STATUS_FLOW = ["pending_verification", "paid", "shipped", "completed", "cancelled"];

function OrdersAdmin(){
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState("all");
  const [invoiceOrder, setInvoiceOrder] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    const { data, error } = await sb.from("orders").select("*").order("created_at", { ascending: false });
    if(!error) setOrders(data || []);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  async function updateStatus(id, status){
    await sb.from("orders").update({ status }).eq("id", id);
    load();
  }

  const filtered = filter === "all" ? orders : orders.filter(o => o.status === filter);

  return (
    <div>
      <div style={{marginBottom:20}}>
        <select value={filter} onChange={e => setFilter(e.target.value)} style={{width:"auto", padding:"8px 12px"}}>
          <option value="all">All orders</option>
          {STATUS_FLOW.map(s => <option key={s} value={s}>{s.replace("_"," ")}</option>)}
        </select>
      </div>

      {loading ? (
        <p>Loading\u2026</p>
      ) : filtered.length === 0 ? (
        <div className="empty">No orders here yet.</div>
      ) : (
        filtered.map(o => (
          <div key={o.id} style={{border:"1px solid var(--line)", background:"white", padding:16, marginBottom:14}}>
            <div style={{display:"flex", justifyContent:"space-between"}}>
              <strong>{o.customer_name}</strong>
              <span className={"status-pill status-" + o.status}>{o.status.replace("_"," ")}</span>
            </div>
            <div style={{fontSize:13, color:"#6b6558", margin:"6px 0"}}>
              {o.phone} \u00B7 {o.address}
            </div>
            <div style={{fontSize:13, margin:"8px 0"}}>
              {o.items.map((it, i) => (
                <div key={i}>{it.qty} \u00D7 {it.name} \u2014 {money(it.price * it.qty)}</div>
              ))}
            </div>
            <div style={{fontSize:13, color:"#6b6558"}}>
              Paid via <strong style={{textTransform:"capitalize"}}>{o.payment_method}</strong> \u00B7 Txn ID: <strong>{o.txn_id || "\u2014"}</strong>
            </div>
            <div style={{fontWeight:600, margin:"8px 0"}}>
              Total: {money(o.total)}
              {o.cashout_charge > 0 && (
                <span style={{fontWeight:400, fontSize:13, color:"#6b6558"}}>
                  {" "}\u00B7 + {money(o.cashout_charge)} cash-out \u2192 expect {money(Number(o.total) + Number(o.cashout_charge))} received
                </span>
              )}
            </div>
            <div style={{display:"flex", gap:8, flexWrap:"wrap", marginTop:10}}>
              <button className="btn" style={{width:"auto", fontSize:12, padding:"6px 14px"}} onClick={() => setInvoiceOrder(o)}>
                Invoice
              </button>
              {STATUS_FLOW.map(s => (
                <button
                  key={s}
                  className={"btn outline"}
                  style={{width:"auto", fontSize:12, padding:"6px 12px", opacity: o.status === s ? 1 : 0.55}}
                  onClick={() => updateStatus(o.id, s)}
                >
                  {s.replace("_"," ")}
                </button>
              ))}
            </div>
          </div>
        ))
      )}
      {invoiceOrder && <Invoice order={invoiceOrder} onClose={() => setInvoiceOrder(null)} />}
    </div>
  );
}

function Invoice({ order, onClose }){
  const d = new Date(order.created_at);
  const dateStr = d.getDate() + "/" + (d.getMonth() + 1) + "/" + d.getFullYear();
  const invNo = "LV-" + String(order.id).replace(/-/g, "").slice(0, 8).toUpperCase();
  const grand = Number(order.total) + Number(order.cashout_charge || 0);

  return (
    <div className="invoice-wrap" onClick={(e) => { if(e.target === e.currentTarget) onClose(); }}>
      <div className="invoice-sheet">
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start"}}>
          <div className="inv-brand">LIVRA</div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:12, letterSpacing:"2px", color:"#a39c8a"}}>INVOICE</div>
            <div style={{fontSize:13, fontWeight:600}}>{invNo}</div>
            <div style={{fontSize:12, color:"#8a8474"}}>{dateStr}</div>
          </div>
        </div>

        <div className="inv-label">Billed to</div>
        <div style={{fontSize:14, fontWeight:500}}>{order.customer_name}</div>
        <div style={{fontSize:12.5, color:"#6b6558"}}>{order.phone}</div>
        <div style={{fontSize:12.5, color:"#6b6558"}}>{order.address}</div>

        <div className="inv-label">Items</div>
        {order.items.map((it, i) => (
          <div className="inv-row" key={i}>
            <span>{it.qty} \u00D7 {it.name}</span>
            <span>{money(it.price * it.qty)}</span>
          </div>
        ))}

        <div className="inv-row" style={{borderBottom:"none", paddingTop:12}}>
          <span style={{color:"#8a8474"}}>Subtotal</span><span>{money(order.total)}</span>
        </div>
        {Number(order.cashout_charge) > 0 && (
          <div className="inv-row" style={{borderBottom:"none", paddingTop:0}}>
            <span style={{color:"#8a8474"}}>bKash cash-out charge</span><span>{money(order.cashout_charge)}</span>
          </div>
        )}
        <div className="inv-row inv-total">
          <span>Total</span><span>{money(grand)}</span>
        </div>

        <div className="inv-label">Payment</div>
        <div style={{fontSize:12.5, color:"#6b6558"}}>
          bKash \u00B7 Transaction ID: <strong style={{color:"#20201C"}}>{order.txn_id || "\u2014"}</strong>
          {" \u00B7 "}Status: <strong style={{color:"#20201C", textTransform:"capitalize"}}>{order.status.replace("_"," ")}</strong>
        </div>

        <div style={{marginTop:26, paddingTop:14, borderTop:"1px solid #E4DCCB", fontSize:11.5, color:"#a39c8a", textAlign:"center"}}>
          Thank you for living in your own aura. \u00B7 livra-psi.vercel.app
        </div>
      </div>
      <div className="inv-actions">
        <button className="btn" onClick={() => window.print()}>Print / Save as PDF</button>
        <button className="btn outline" style={{background:"white"}} onClick={onClose}>Close</button>
      </div>
    </div>
  );
}

function AdminGate(){
  const [session, setSession] = useState(undefined);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: listener } = sb.auth.onAuthStateChange((_event, sess) => setSession(sess));
    return () => listener.subscription.unsubscribe();
  }, []);

  if(session === undefined) return <div className="admin-wrap">Loading\u2026</div>;
  if(!session) return <AdminLogin />;
  return <AdminDashboard />;
}

function App(){
  const [route, setRoute] = useState(window.location.hash);
  useEffect(() => {
    const onHash = () => setRoute(window.location.hash);
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);
  return route === "#/admin" ? <AdminGate /> : <Storefront />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
