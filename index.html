<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LIVRA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
  :root{
    --cream:#F7F3EC;
    --ink:#20201C;
    --brass:#A8823A;
    --brass-dim:#c9ad78;
    --line:#E4DCCB;
    --danger:#A8422F;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.serif{ font-family:'Cormorant Garamond', serif; }
  a{ color:inherit; }
  button{ font-family:inherit; cursor:pointer; }
  ::selection{ background:var(--brass); color:white; }

  .container{ max-width:1100px; margin:0 auto; padding:0 20px; }

  /* Header */
  .nav{
    position:sticky; top:0; z-index:20;
    background:rgba(247,243,236,0.92); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .nav-inner{ display:flex; align-items:center; justify-content:space-between; padding:18px 20px; max-width:1100px; margin:0 auto; }
  .logo{ font-family:'Cormorant Garamond', serif; font-size:28px; letter-spacing:2px; font-weight:500; }
  .nav-actions{ display:flex; align-items:center; gap:18px; font-size:14px; letter-spacing:0.5px; }
  .cart-btn{ position:relative; background:none; border:1px solid var(--ink); border-radius:999px; padding:8px 18px; font-size:13px; }
  .cart-count{ position:absolute; top:-8px; right:-8px; background:var(--brass); color:white; border-radius:50%; width:20px; height:20px; font-size:11px; display:flex; align-items:center; justify-content:center; }

  /* Hero */
  .hero{ padding:70px 20px 40px; text-align:center; }
  .hero h1{ font-size:56px; font-weight:500; margin:0 0 12px; }
  .hero p{ color:#6b6558; font-size:16px; max-width:480px; margin:0 auto; }

  /* Product grid */
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:28px; padding:30px 20px 80px; max-width:1100px; margin:0 auto; }
  .card{ background:white; border:1px solid var(--line); overflow:hidden; transition:transform .25s ease, box-shadow .25s ease; }
  .card:hover{ transform:translateY(-3px); box-shadow:0 12px 24px rgba(32,32,28,0.08); }
  .card-img{ width:100%; aspect-ratio:1; object-fit:cover; background:#eee; display:block; }
  .card-body{ padding:16px 18px 20px; }
  .card-name{ font-size:19px; font-family:'Cormorant Garamond', serif; margin:0 0 4px; }
  .card-price{ color:var(--brass); font-weight:600; font-size:15px; margin:0 0 12px; }
  .card-stock{ font-size:12px; color:#8a8474; margin-bottom:10px; }
  .btn{
    display:inline-block; background:var(--ink); color:white; border:none;
    padding:11px 20px; font-size:13px; letter-spacing:0.5px; width:100%;
    text-align:center; transition:background .2s;
  }
  .btn:hover{ background:var(--brass); }
  .btn.outline{ background:none; color:var(--ink); border:1px solid var(--ink); }
  .btn.outline:hover{ background:var(--ink); color:white; }
  .btn.danger{ background:var(--danger); }
  .btn:disabled{ opacity:0.4; cursor:not-allowed; }

  /* Drawer / modal */
  .overlay{ position:fixed; inset:0; background:rgba(32,32,28,0.4); z-index:40; }
  .drawer{
    position:fixed; top:0; right:0; height:100%; width:min(420px,100%);
    background:var(--cream); z-index:50; padding:26px 24px; overflow-y:auto;
    box-shadow:-10px 0 30px rgba(0,0,0,0.15);
  }
  .drawer h2{ font-size:26px; margin-top:0; }
  .close-x{ background:none; border:none; font-size:22px; float:right; }

  .cart-line{ display:flex; gap:12px; padding:14px 0; border-bottom:1px solid var(--line); align-items:center; }
  .cart-line img{ width:56px; height:56px; object-fit:cover; }
  .cart-line-info{ flex:1; }
  .cart-line-info .nm{ font-size:15px; margin:0; }
  .qty-row{ display:flex; align-items:center; gap:8px; margin-top:6px; }
  .qty-row button{ background:none; border:1px solid var(--line); width:24px; height:24px; }

  input,textarea{
    width:100%; padding:10px 12px; border:1px solid var(--line); background:white;
    font-family:inherit; font-size:14px; margin-bottom:14px;
  }
  label{ font-size:12px; letter-spacing:0.5px; color:#6b6558; display:block; margin-bottom:4px; }

  .pay-option{ border:1px solid var(--line); padding:14px; margin-bottom:10px; cursor:pointer; }
  .pay-option.selected{ border-color:var(--brass); background:#fbf6ec; }

  .footer{ text-align:center; padding:40px 20px; color:#8a8474; font-size:13px; border-top:1px solid var(--line); }
  .admin-link{ font-size:11px; color:#c9c2b0; }

  /* Admin */
  .admin-wrap{ max-width:960px; margin:0 auto; padding:40px 20px 100px; }
  .tabs{ display:flex; gap:10px; margin-bottom:28px; border-bottom:1px solid var(--line); }
  .tab{ padding:10px 4px; margin-right:20px; background:none; border:none; font-size:14px; color:#8a8474; border-bottom:2px solid transparent; }
  .tab.active{ color:var(--ink); border-bottom-color:var(--brass); }
  .admin-row{ display:flex; gap:16px; align-items:center; padding:14px 0; border-bottom:1px solid var(--line); }
  .admin-row img{ width:56px; height:56px; object-fit:cover; }
  .admin-row .grow{ flex:1; }
  .status-pill{ font-size:11px; padding:4px 10px; border-radius:999px; text-transform:uppercase; letter-spacing:0.5px; }
  .status-pending_verification{ background:#f6e7d0; color:#8a5a1e; }
  .status-paid{ background:#dcefe0; color:#2c6e3f; }
  .status-shipped{ background:#dde7f6; color:#2c4e8a; }
  .status-completed{ background:#e6e6e6; color:#555; }
  .status-cancelled{ background:#f6dcdc; color:#8a2c2c; }

  .form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:0 16px; }
  .empty{ text-align:center; padding:60px 20px; color:#a39c8a; }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:white; padding:12px 24px; z-index:100; font-size:14px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

// ============================================
// CONFIG — replace with your Supabase project values
// Find these in Supabase Dashboard > Project Settings > API
// ============================================
const SUPABASE_URL = "https://empjwjjonbjbwiwcxlao.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtcGp3ampvbmJqYndpd2N4bGFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MzAxODgsImV4cCI6MjA5OTMwNjE4OH0.nMrAU1a8teyBJDvPfr46dn7oVktx9QVtjT22CIAzzws";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Personal number — customers use "Send Money" and add the cash-out charge
const PAYMENT_NUMBERS = {
  bkash: "01675362939",
  nagad: "01675362939",
};

// Cash-out charge the customer adds on top (1.85% = ৳18.50 per ৳1,000).
// Change this number if bKash/Nagad rates change.
const CASHOUT_RATE = 0.0185;

function money(n){
  return "৳" + Number(n).toLocaleString("en-BD", { maximumFractionDigits: 0 });
}

function Toast({ message }){
  if(!message) return null;
  return <div className="toast">{message}</div>;
}

// ============================================
// STOREFRONT
// ============================================
function Storefront(){
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [checkoutOpen, setCheckoutOpen] = useState(false);
  const [toast, setToast] = useState("");

  const loadProducts = useCallback(async () => {
    setLoading(true);
    const { data, error } = await sb
      .from("products")
      .select("*")
      .eq("active", true)
      .order("created_at", { ascending: false });
    if(!error) setProducts(data || []);
    setLoading(false);
  }, []);

  useEffect(() => { loadProducts(); }, [loadProducts]);

  function showToast(msg){
    setToast(msg);
    setTimeout(() => setToast(""), 2200);
  }

  function addToCart(product){
    setCart(prev => {
      const existing = prev.find(l => l.product_id === product.id);
      if(existing){
        return prev.map(l => l.product_id === product.id ? { ...l, qty: Math.min(l.qty + 1, product.stock) } : l);
      }
      return [...prev, { product_id: product.id, name: product.name, price: product.price, image_url: product.image_url, qty: 1, stock: product.stock }];
    });
    showToast(`Added "${product.name}" to bag`);
  }

  function updateQty(product_id, delta){
    setCart(prev => prev
      .map(l => l.product_id === product_id ? { ...l, qty: l.qty + delta } : l)
      .filter(l => l.qty > 0)
    );
  }

  const cartCount = cart.reduce((s, l) => s + l.qty, 0);
  const cartTotal = cart.reduce((s, l) => s + l.qty * l.price, 0);

  return (
    <div>
      <Toast message={toast} />
      <nav className="nav">
        <div className="nav-inner">
          <div className="logo">LIVRA</div>
          <div className="nav-actions">
            <button className="cart-btn" onClick={() => setCartOpen(true)}>
              Bag{cartCount > 0 && <span className="cart-count">{cartCount}</span>}
            </button>
          </div>
        </div>
      </nav>

      <div className="hero">
        <h1>Live in your own aura</h1>
        <p>Considered pieces, shipped with care.</p>
      </div>

      {loading ? (
        <div className="empty">Loading pieces…</div>
      ) : products.length === 0 ? (
        <div className="empty">Nothing here yet — check back soon.</div>
      ) : (
        <div className="grid">
          {products.map(p => (
            <div className="card" key={p.id}>
              <img className="card-img" src={p.image_url || "https://placehold.co/400x400?text=LIVRA"} alt={p.name} />
              <div className="card-body">
                <h3 className="card-name">{p.name}</h3>
                <p className="card-price">{money(p.price)}</p>
                <p className="card-stock">{p.stock > 0 ? `${p.stock} in stock` : "Out of stock"}</p>
                <button className="btn" disabled={p.stock <= 0} onClick={() => addToCart(p)}>
                  {p.stock <= 0 ? "Sold out" : "Add to bag"}
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {cartOpen && (
        <React.Fragment>
          <div className="overlay" onClick={() => setCartOpen(false)} />
          <div className="drawer">
            <button className="close-x" onClick={() => setCartOpen(false)}>×</button>
            <h2>Your bag</h2>
            {cart.length === 0 ? (
              <p style={{color:"#8a8474"}}>Your bag is empty.</p>
            ) : (
              <React.Fragment>
                {cart.map(l => (
                  <div className="cart-line" key={l.product_id}>
                    <img src={l.image_url || "https://placehold.co/100x100?text=LIVRA"} alt={l.name} />
                    <div className="cart-line-info">
                      <p className="nm">{l.name}</p>
                      <div className="qty-row">
                        <button onClick={() => updateQty(l.product_id, -1)}>−</button>
                        <span>{l.qty}</span>
                        <button onClick={() => updateQty(l.product_id, 1)} disabled={l.qty >= l.stock}>+</button>
                      </div>
                    </div>
                    <div>{money(l.price * l.qty)}</div>
                  </div>
                ))}
                <div style={{display:"flex", justifyContent:"space-between", padding:"18px 0", fontWeight:600}}>
                  <span>Total</span><span>{money(cartTotal)}</span>
                </div>
                <button className="btn" onClick={() => { setCartOpen(false); setCheckoutOpen(true); }}>
                  Checkout
                </button>
              </React.Fragment>
            )}
          </div>
        </React.Fragment>
      )}

      {checkoutOpen && (
        <Checkout
          cart={cart}
          total={cartTotal}
          onClose={() => setCheckoutOpen(false)}
          onSuccess={() => { setCart([]); setCheckoutOpen(false); showToast("Order placed — thank you!"); }}
        />
      )}

      <div className="footer">
        <div>© {new Date().getFullYear()} LIVRA</div>
        <a className="admin-link" href="#/admin">admin</a>
      </div>
    </div>
  );
}

// ============================================
// CHECKOUT
// ============================================
function Checkout({ cart, total, onClose, onSuccess }){
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [address, setAddress] = useState("");
  const [method, setMethod] = useState("bkash");
  const [txnId, setTxnId] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState("");

  const cashoutCharge = Math.ceil(total * CASHOUT_RATE);
  const amountToSend = total + cashoutCharge;

  async function submitOrder(){
    setError("");
    if(!name || !phone || !address){
      setError("Please fill in your name, phone, and address.");
      return;
    }
    if(!txnId){
      setError("Enter the transaction ID from your payment so we can verify it.");
      return;
    }
    setSubmitting(true);
    const { error: insertError } = await sb.from("orders").insert({
      customer_name: name,
      phone,
      address,
      items: cart.map(l => ({ product_id: l.product_id, name: l.name, price: l.price, qty: l.qty })),
      total,
      cashout_charge: cashoutCharge,
      payment_method: method,
      txn_id: txnId,
      status: "pending_verification",
    });
    setSubmitting(false);
    if(insertError){
      setError("Something went wrong submitting your order. Please try again.");
      return;
    }
    onSuccess();
  }

  return (
    <React.Fragment>
      <div className="overlay" onClick={onClose} />
      <div className="drawer">
        <button className="close-x" onClick={onClose}>×</button>
        <h2>Checkout</h2>

        <label>Full name</label>
        <input value={name} onChange={e => setName(e.target.value)} placeholder="Your name" />

        <label>Phone number</label>
        <input value={phone} onChange={e => setPhone(e.target.value)} placeholder="01XXXXXXXXX" />

        <label>Delivery address</label>
        <textarea rows="3" value={address} onChange={e => setAddress(e.target.value)} placeholder="House, road, area, city" />

        <label>Pay with</label>
        {["bkash", "nagad"].map(m => (
          <div key={m} className={"pay-option" + (method === m ? " selected" : "")} onClick={() => setMethod(m)}>
            <strong style={{textTransform:"capitalize"}}>{m}</strong>
            <p style={{margin:"6px 0 0", fontSize:13, color:"#6b6558"}}>
              Send Money <strong>{money(amountToSend)}</strong> to <strong>{PAYMENT_NUMBERS[m]}</strong> (personal number — cash-out charge included), then enter the transaction ID below.
            </p>
          </div>
        ))}

        <label>Transaction ID</label>
        <input value={txnId} onChange={e => setTxnId(e.target.value)} placeholder="e.g. 8N7K2X9ABC" />

        {error && <p style={{color:"#A8422F", fontSize:13}}>{error}</p>}

        <div style={{padding:"10px 0 18px", fontSize:14}}>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:4}}>
            <span>Subtotal</span><span>{money(total)}</span>
          </div>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:4, color:"#6b6558"}}>
            <span>Cash-out charge</span><span>{money(cashoutCharge)}</span>
          </div>
          <div style={{display:"flex", justifyContent:"space-between", fontWeight:600, borderTop:"1px solid var(--line)", paddingTop:8, marginTop:8}}>
            <span>Amount to send</span><span>{money(amountToSend)}</span>
          </div>
        </div>

        <button className="btn" disabled={submitting} onClick={submitOrder}>
          {submitting ? "Placing order…" : "Place order"}
        </button>
        <p style={{fontSize:12, color:"#a39c8a", marginTop:10}}>
          Your order will be marked as pending until we verify your payment. We'll reach out on the phone number you provided.
        </p>
      </div>
    </React.Fragment>
  );
}

// ============================================
// ADMIN — LOGIN
// ============================================
function AdminLogin({ onLoggedIn }){
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  async function login(){
    setLoading(true);
    setError("");
    const { error } = await sb.auth.signInWithPassword({ email, password });
    setLoading(false);
    if(error){ setError(error.message); return; }
    onLoggedIn();
  }

  return (
    <div className="admin-wrap" style={{maxWidth:380}}>
      <h2>Admin login</h2>
      <label>Email</label>
      <input value={email} onChange={e => setEmail(e.target.value)} type="email" />
      <label>Password</label>
      <input value={password} onChange={e => setPassword(e.target.value)} type="password" onKeyDown={e => e.key === "Enter" && login()} />
      {error && <p style={{color:"#A8422F", fontSize:13}}>{error}</p>}
      <button className="btn" disabled={loading} onClick={login}>{loading ? "Signing in…" : "Sign in"}</button>
    </div>
  );
}

// ============================================
// ADMIN — DASHBOARD
// ============================================
function AdminDashboard(){
  const [tab, setTab] = useState("products");
  return (
    <div className="admin-wrap">
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
        <h1 style={{fontSize:32}}>LIVRA Admin</h1>
        <button className="btn outline" style={{width:"auto"}} onClick={() => sb.auth.signOut().then(() => window.location.reload())}>
          Sign out
        </button>
      </div>
      <div className="tabs">
        <button className={"tab" + (tab === "products" ? " active" : "")} onClick={() => setTab("products")}>Products</button>
        <button className={"tab" + (tab === "orders" ? " active" : "")} onClick={() => setTab("orders")}>Orders</button>
      </div>
      {tab === "products" ? <ProductsAdmin /> : <OrdersAdmin />}
    </div>
  );
}

function emptyProduct(){
  return { id: null, name: "", description: "", price: "", stock: "", image_url: "", active: true };
}

function ProductsAdmin(){
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editing, setEditing] = useState(null); // product object or null
  const [uploading, setUploading] = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    const { data, error } = await sb.from("products").select("*").order("created_at", { ascending: false });
    if(!error) setProducts(data || []);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  async function handleImageUpload(file){
    setUploading(true);
    const ext = file.name.split(".").pop();
    const path = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const { error } = await sb.storage.from("product-images").upload(path, file);
    setUploading(false);
    if(error){ alert("Image upload failed: " + error.message); return null; }
    const { data } = sb.storage.from("product-images").getPublicUrl(path);
    return data.publicUrl;
  }

  async function saveProduct(p){
    const payload = {
      name: p.name,
      description: p.description,
      price: parseFloat(p.price) || 0,
      stock: parseInt(p.stock) || 0,
      image_url: p.image_url,
      active: p.active,
    };
    if(p.id){
      await sb.from("products").update(payload).eq("id", p.id);
    } else {
      await sb.from("products").insert(payload);
    }
    setEditing(null);
    load();
  }

  async function deleteProduct(id){
    if(!confirm("Delete this product? This can't be undone.")) return;
    await sb.from("products").delete().eq("id", id);
    load();
  }

  async function toggleActive(p){
    await sb.from("products").update({ active: !p.active }).eq("id", p.id);
    load();
  }

  return (
    <div>
      <button className="btn" style={{width:"auto", marginBottom:20}} onClick={() => setEditing(emptyProduct())}>
        + Add product
      </button>

      {editing && (
        <ProductForm
          product={editing}
          uploading={uploading}
          onUpload={handleImageUpload}
          onCancel={() => setEditing(null)}
          onSave={saveProduct}
        />
      )}

      {loading ? (
        <p>Loading…</p>
      ) : products.length === 0 ? (
        <div className="empty">No products yet. Add your first one above.</div>
      ) : (
        products.map(p => (
          <div className="admin-row" key={p.id}>
            <img src={p.image_url || "https://placehold.co/100x100?text=LIVRA"} alt={p.name} />
            <div className="grow">
              <strong>{p.name}</strong>
              <div style={{fontSize:13, color:"#8a8474"}}>{money(p.price)} · {p.stock} in stock {!p.active && "· hidden"}</div>
            </div>
            <button className="btn outline" style={{width:"auto"}} onClick={() => setEditing(p)}>Edit</button>
            <button className="btn outline" style={{width:"auto"}} onClick={() => toggleActive(p)}>{p.active ? "Hide" : "Unhide"}</button>
            <button className="btn danger" style={{width:"auto"}} onClick={() => deleteProduct(p.id)}>Delete</button>
          </div>
        ))
      )}
    </div>
  );
}

function ProductForm({ product, uploading, onUpload, onCancel, onSave }){
  const [p, setP] = useState(product);

  async function handleFile(e){
    const file = e.target.files[0];
    if(!file) return;
    const url = await onUpload(file);
    if(url) setP(prev => ({ ...prev, image_url: url }));
  }

  return (
    <div style={{border:"1px solid var(--line)", padding:20, marginBottom:24, background:"white"}}>
      <label>Product name</label>
      <input value={p.name} onChange={e => setP({...p, name: e.target.value})} />

      <label>Description</label>
      <textarea rows="3" value={p.description || ""} onChange={e => setP({...p, description: e.target.value})} />

      <div className="form-grid">
        <div>
          <label>Price (৳)</label>
          <input type="number" value={p.price} onChange={e => setP({...p, price: e.target.value})} />
        </div>
        <div>
          <label>Stock</label>
          <input type="number" value={p.stock} onChange={e => setP({...p, stock: e.target.value})} />
        </div>
      </div>

      <label>Product photo</label>
      <input type="file" accept="image/*" onChange={handleFile} />
      {uploading && <p style={{fontSize:13}}>Uploading…</p>}
      {p.image_url && <img src={p.image_url} alt="" style={{width:80, height:80, objectFit:"cover", marginTop:8}} />}

      <div style={{display:"flex", gap:10, marginTop:18}}>
        <button className="btn" onClick={() => onSave(p)}>Save product</button>
        <button className="btn outline" onClick={onCancel}>Cancel</button>
      </div>
    </div>
  );
}

const STATUS_FLOW = ["pending_verification", "paid", "shipped", "completed", "cancelled"];

function OrdersAdmin(){
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState("all");

  const load = useCallback(async () => {
    setLoading(true);
    const { data, error } = await sb.from("orders").select("*").order("created_at", { ascending: false });
    if(!error) setOrders(data || []);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  async function updateStatus(id, status){
    await sb.from("orders").update({ status }).eq("id", id);
    load();
  }

  const filtered = filter === "all" ? orders : orders.filter(o => o.status === filter);

  return (
    <div>
      <div style={{marginBottom:20}}>
        <select value={filter} onChange={e => setFilter(e.target.value)} style={{width:"auto", padding:"8px 12px"}}>
          <option value="all">All orders</option>
          {STATUS_FLOW.map(s => <option key={s} value={s}>{s.replace("_"," ")}</option>)}
        </select>
      </div>

      {loading ? (
        <p>Loading…</p>
      ) : filtered.length === 0 ? (
        <div className="empty">No orders here yet.</div>
      ) : (
        filtered.map(o => (
          <div key={o.id} style={{border:"1px solid var(--line)", background:"white", padding:16, marginBottom:14}}>
            <div style={{display:"flex", justifyContent:"space-between"}}>
              <strong>{o.customer_name}</strong>
              <span className={"status-pill status-" + o.status}>{o.status.replace("_"," ")}</span>
            </div>
            <div style={{fontSize:13, color:"#6b6558", margin:"6px 0"}}>
              {o.phone} · {o.address}
            </div>
            <div style={{fontSize:13, margin:"8px 0"}}>
              {o.items.map((it, i) => (
                <div key={i}>{it.qty} × {it.name} — {money(it.price * it.qty)}</div>
              ))}
            </div>
            <div style={{fontSize:13, color:"#6b6558"}}>
              Paid via <strong style={{textTransform:"capitalize"}}>{o.payment_method}</strong> · Txn ID: <strong>{o.txn_id || "—"}</strong>
            </div>
            <div style={{fontWeight:600, margin:"8px 0"}}>
              Total: {money(o.total)}
              {o.cashout_charge > 0 && (
                <span style={{fontWeight:400, fontSize:13, color:"#6b6558"}}>
                  {" "}· + {money(o.cashout_charge)} cash-out → expect {money(Number(o.total) + Number(o.cashout_charge))} received
                </span>
              )}
            </div>
            <div style={{display:"flex", gap:8, flexWrap:"wrap", marginTop:10}}>
              {STATUS_FLOW.map(s => (
                <button
                  key={s}
                  className={"btn outline"}
                  style={{width:"auto", fontSize:12, padding:"6px 12px", opacity: o.status === s ? 1 : 0.55}}
                  onClick={() => updateStatus(o.id, s)}
                >
                  {s.replace("_"," ")}
                </button>
              ))}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

function AdminGate(){
  const [session, setSession] = useState(undefined); // undefined = loading

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: listener } = sb.auth.onAuthStateChange((_event, sess) => setSession(sess));
    return () => listener.subscription.unsubscribe();
  }, []);

  if(session === undefined) return <div className="admin-wrap">Loading…</div>;
  if(!session) return <AdminLogin onLoggedIn={() => {}} />;
  return <AdminDashboard />;
}

// ============================================
// ROOT — simple hash router
// ============================================
function App(){
  const [route, setRoute] = useState(window.location.hash);
  useEffect(() => {
    const onHash = () => setRoute(window.location.hash);
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);
  return route === "#/admin" ? <AdminGate /> : <Storefront />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
